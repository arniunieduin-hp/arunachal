<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arunachal University Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#5e7777;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
width:360px;
padding:35px;
border-radius:8px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.logo{
width:220px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#3b79b7;
color:white;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2c5f8f;
}

</style>
</head>

<body>

<div class="login-box">

<img class="logo" src="https://i.ibb.co/wxvDWyb/aus-naac-logo-1400w.webp">

<h3>Login to your account</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Sign in</button>

<p id="error" style="color:red"></p>

</div>

<script>

function login(){

var u=document.getElementById("user").value;
var p=document.getElementById("pass").value;

if(u=="CSACE13347" && p=="15072000"){
localStorage.setItem("student",u);
location="dashboard.html";
}

else if(u=="CSACE13371" && p=="03021999"){
localStorage.setItem("student",u);
location="dashboard.html";
}

else{
document.getElementById("error").innerText="Invalid Login";
}

}

</script>

</body>
</html>
